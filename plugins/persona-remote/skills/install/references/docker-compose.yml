# Remote persona container — generated by persona-remote expansion pack
# Placeholders: {name} = persona name
services:
  persona-{name}:
    image: persona-{name}
    container_name: persona-{name}
    volumes:
      # Persona workspace (read-only — config, skills, CLAUDE.md)
      - /opt/personas/{name}:/workspace:ro
      # Claude auth credentials (read-only — never bake into image)
      - /opt/personas/auth:/home/node/.claude:ro
      # Memory directory (read-write — overlays the ro workspace mount)
      - /opt/personas/{name}/user/memory:/workspace/user/memory:rw
      # Persistent data volume
      - persona-{name}-data:/data
    restart: unless-stopped
    stdin_open: false
    tty: false

volumes:
  persona-{name}-data:
